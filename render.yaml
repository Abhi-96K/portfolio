databases:
  - name: portfolio_db
    databaseName: portfolio_db
    user: abhi_operator
    plan: free

services:
  - type: web
    name: extraordinary-portfolio
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn portfolio_project.wsgi:application
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio_db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
